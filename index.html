<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>채권ETF운용본부 업무 캘린더</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <h1 class="header-title">채권ETF운용본부 업무 캘린더</h1>
      <button class="btn-settings" id="btn-settings">⚙ 설정</button>
    </div>
  </header>

  <!-- Main -->
  <main class="main">

    <!-- Month Navigation -->
    <div class="month-nav">
      <button class="btn-month" id="btn-prev">&#9664;</button>
      <h2 class="month-title" id="month-title"></h2>
      <button class="btn-month" id="btn-next">&#9654;</button>
    </div>

    <!-- Legend -->
    <div class="legend">
      <span class="legend-item"><span class="badge badge-리밸런싱"></span>리밸런싱</span>
      <span class="legend-item"><span class="badge badge-롤오버"></span>롤오버</span>
      <span class="legend-item"><span class="badge badge-분배"></span>분배</span>
      <span class="legend-item"><span class="badge badge-상장"></span>상장</span>
      <span class="legend-item"><span class="badge badge-기타"></span>기타</span>
      <span class="legend-item"><span class="badge badge-설정환매"></span>설정환매</span>
      <span class="legend-item"><span class="badge badge-기타일정"></span>기타일정</span>
    </div>

    <!-- Calendar -->
    <div class="calendar-wrap">
      <div class="calendar-header">
        <div class="dow">일</div>
        <div class="dow">월</div>
        <div class="dow">화</div>
        <div class="dow">수</div>
        <div class="dow">목</div>
        <div class="dow">금</div>
        <div class="dow">토</div>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
    </div>

  </main>

  <!-- Detail Modal -->
  <div class="overlay hidden" id="overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-date" id="modal-date"></h3>
        <button class="btn-close" id="btn-close">✕</button>
      </div>

      <!-- Tabs -->
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="업무일정">업무일정</button>
        <button class="tab-btn" data-tab="설정환매">설정환매</button>
        <button class="tab-btn" data-tab="기타일정">기타일정</button>
        <button class="tab-btn" data-tab="체크리스트">업무 체크리스트</button>
      </div>

      <!-- Tab Panels -->
      <div class="tab-panels">

        <!-- 업무일정 -->
        <div class="tab-panel active" id="panel-업무일정">
          <div class="item-list" id="list-업무일정"></div>
          <div class="form-section">
            <h4 class="form-title">+ 업무 추가</h4>
            <div class="form-grid">
              <input class="input" id="업무-제목" type="text" placeholder="제목">
              <select class="input" id="업무-분류">
                <option value="">분류 선택</option>
                <option>리밸런싱</option>
                <option>롤오버</option>
                <option>분배</option>
                <option>상장</option>
                <option>기타</option>
              </select>
              <textarea class="input textarea" id="업무-상세" placeholder="상세내용" rows="2"></textarea>
            </div>
            <button class="btn-add" onclick="app.addItem('업무일정')">추가</button>
          </div>
        </div>

        <!-- 설정환매 -->
        <div class="tab-panel hidden" id="panel-설정환매">
          <div class="item-list" id="list-설정환매"></div>
          <div class="form-section">
            <h4 class="form-title">+ 설정 / 환매 추가</h4>
            <div class="form-grid form-grid-3">
              <input class="input" id="설환-코드" type="text" placeholder="펀드코드">
              <input class="input" id="설환-펀드명" type="text" placeholder="펀드명">
              <input class="input" id="설환-cu" type="number" placeholder="CU">
              <input class="input" id="설환-금액" type="text" placeholder="금액">
              <input class="input" id="설환-거래상대방" type="text" placeholder="거래상대방">
              <input class="input" id="설환-비고" type="text" placeholder="비고">
            </div>
            <button class="btn-add" onclick="app.addItem('설정환매')">추가</button>
          </div>
        </div>

        <!-- 기타일정 -->
        <div class="tab-panel hidden" id="panel-기타일정">
          <div class="item-list" id="list-기타일정"></div>
          <div class="form-section">
            <h4 class="form-title">+ 일정 추가</h4>
            <div class="form-grid">
              <input class="input" id="기타-일정명" type="text" placeholder="일정명">
              <textarea class="input textarea" id="기타-상세" placeholder="상세" rows="2"></textarea>
            </div>
            <button class="btn-add" onclick="app.addItem('기타일정')">추가</button>
          </div>
        </div>

        <!-- 업무 체크리스트 -->
        <div class="tab-panel hidden" id="panel-체크리스트">
          <div class="item-list" id="list-체크리스트"></div>
          <div class="form-section">
            <h4 class="form-title">+ 체크리스트 추가</h4>
            <div class="form-grid form-grid-3">
              <select class="input" id="체크-팀원">
                <option value="">본부원명 선택</option>
                <option>김동명</option>
                <option>류연지</option>
                <option>최유진</option>
                <option>김휘겸</option>
                <option>김시은</option>
              </select>
              <select class="input" id="체크-분류">
                <option value="">분류 선택</option>
                <option>리밸런싱</option>
                <option>롤오버</option>
                <option>분배</option>
                <option>상장</option>
                <option>기타</option>
              </select>
              <input class="input span-full" id="체크-할일" type="text" placeholder="할일">
            </div>
            <button class="btn-add" onclick="app.addItem('체크리스트')">추가</button>
          </div>
        </div>

      </div>

      <!-- Modal Footer -->
      <div class="modal-footer">
        <span class="save-status" id="save-status"></span>
        <button class="btn-save" onclick="app.saveDay()">저장</button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="overlay hidden" id="settings-overlay">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3>설정</h3>
        <button class="btn-close" id="btn-settings-close">✕</button>
      </div>
      <div class="settings-body">
        <label class="label">GitHub Personal Access Token</label>
        <input class="input" id="input-token" type="password" placeholder="ghp_...">
        <p class="settings-hint">토큰은 이 브라우저에만 저장됩니다. 타인과 공유하지 마세요.</p>
      </div>
      <div class="modal-footer">
        <button class="btn-save" onclick="app.saveSettings()">저장</button>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div class="toast hidden" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
