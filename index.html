<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>채권ETF운용본부 업무 캘린더</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <h1 class="header-title">채권ETF운용본부 업무 캘린더</h1>
      <button class="btn-settings" id="btn-settings">⚙ 설정</button>
    </div>
  </header>

  <!-- Main (calendar + list panel side-by-side) -->
  <main class="main">

    <!-- Left: Calendar -->
    <div class="calendar-side">

      <!-- Month Navigation -->
      <div class="month-nav">
        <button class="btn-month" id="btn-prev">&#9664;</button>
        <h2 class="month-title" id="month-title"></h2>
        <button class="btn-month" id="btn-next">&#9654;</button>
      </div>

      <!-- Legend -->
      <div class="legend">
        <span class="legend-item"><span class="badge badge-리밸런싱"></span>리밸런싱</span>
        <span class="legend-item"><span class="badge badge-롤오버"></span>롤오버</span>
        <span class="legend-item"><span class="badge badge-매매"></span>매매</span>
        <span class="legend-item"><span class="badge badge-스왑"></span>스왑</span>
        <span class="legend-item"><span class="badge badge-분배"></span>분배</span>
        <span class="legend-item"><span class="badge badge-상장"></span>상장</span>
        <span class="legend-item"><span class="badge badge-기타"></span>기타</span>
        <span class="legend-item"><span class="badge badge-설정환매"></span>설정환매</span>
        <span class="legend-item"><span class="badge badge-일정"></span>일정</span>
        <span class="legend-item"><span class="badge badge-리소스"></span>리소스</span>
      </div>

      <!-- Calendar -->
      <div class="calendar-wrap">
        <div class="calendar-header">
          <div class="dow">일</div>
          <div class="dow">월</div>
          <div class="dow">화</div>
          <div class="dow">수</div>
          <div class="dow">목</div>
          <div class="dow">금</div>
          <div class="dow">토</div>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
      </div>

    </div>

    <!-- Right: List Panel -->
    <aside class="list-panel">
      <div class="list-panel-header">
        <span class="list-panel-title">내역 목록</span>
        <button class="btn-list-refresh" onclick="app.renderListPanel()" title="새로고침">↻</button>
      </div>

      <!-- Filters -->
      <div class="list-filters">
        <div class="filter-row">
          <input type="date" id="filter-from" class="input input-sm">
          <span class="filter-sep">~</span>
          <input type="date" id="filter-to" class="input input-sm">
          <button class="btn-filter-apply" onclick="app.applyListFilter()">적용</button>
        </div>
        <div class="filter-row">
          <input type="text" id="filter-fund" class="input input-sm" placeholder="펀드코드 필터">
          <button class="btn-sum" onclick="app.calcSum()">합계</button>
        </div>
      </div>

      <!-- Sum Result Bar -->
      <div class="list-sum-bar hidden" id="list-sum-bar"></div>

      <!-- Category Tabs -->
      <div class="list-cat-tabs">
        <button class="list-tab-btn active" data-cat="전체">전체</button>
        <button class="list-tab-btn" data-cat="일정">일정</button>
        <button class="list-tab-btn" data-cat="업무">업무</button>
        <button class="list-tab-btn" data-cat="설정환매">설정환매</button>
        <button class="list-tab-btn" data-cat="리소스">리소스</button>
      </div>

      <!-- Items -->
      <div class="list-items" id="list-items"></div>
    </aside>

  </main>

  <!-- Detail Modal -->
  <div class="overlay hidden" id="overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-date" id="modal-date"></h3>
        <button class="btn-close" id="btn-close">✕</button>
      </div>

      <!-- 전체 내역 (위) -->
      <div class="summary-section" id="summary-section"></div>

      <!-- 입력 구분선 -->
      <div class="input-divider">항목 추가</div>

      <!-- Tabs -->
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="일정">일정</button>
        <button class="tab-btn" data-tab="업무">업무</button>
        <button class="tab-btn" data-tab="설정환매">설정환매</button>
        <button class="tab-btn" data-tab="리소스">리소스</button>
      </div>

      <!-- Tab Panels -->
      <div class="tab-panels">

        <!-- 일정 -->
        <div class="tab-panel active" id="panel-일정">
          <div class="form-grid">
            <input class="input span-full" id="일정-일정명" type="text" placeholder="일정명">
            <textarea class="input textarea span-full" id="일정-상세" placeholder="상세" rows="2"></textarea>
          </div>
          <button class="btn-add" onclick="app.addItem('일정')">추가</button>
        </div>

        <!-- 업무 -->
        <div class="tab-panel hidden" id="panel-업무">
          <div class="form-grid">
            <select class="input" id="업무-본부원명">
              <option value="">본부원명 선택</option>
              <option>김동명</option>
              <option>류연지</option>
              <option>최유진</option>
              <option>김휘겸</option>
              <option>김시은</option>
            </select>
            <input class="input" id="업무-펀드코드" type="text" placeholder="펀드코드">
            <input class="input" id="업무-제목" type="text" placeholder="제목">
            <select class="input" id="업무-분류">
              <option value="">분류 선택</option>
              <option>리밸런싱</option>
              <option>롤오버</option>
              <option>매매</option>
              <option>스왑</option>
              <option>분배</option>
              <option>상장</option>
              <option>기타</option>
            </select>
            <textarea class="input textarea span-full" id="업무-상세" placeholder="상세내용" rows="2"></textarea>
          </div>
          <button class="btn-add" onclick="app.addItem('업무')">추가</button>
        </div>

        <!-- 설정환매 -->
        <div class="tab-panel hidden" id="panel-설정환매">
          <div class="form-grid form-grid-3">
            <input class="input" id="설환-코드" type="text" placeholder="펀드코드 (입력 후 Tab)">
            <input class="input" id="설환-펀드명" type="text" placeholder="펀드명 (자동입력)">
            <input class="input" id="설환-cu" type="number" placeholder="CU">
            <input class="input" id="설환-금액" type="text" placeholder="금액 (자동계산)" readonly style="background:#f8fafc; color:#64748b;">
            <input class="input" id="설환-거래상대방" type="text" placeholder="거래상대방">
            <input class="input" id="설환-비고" type="text" placeholder="비고">
          </div>
          <button class="btn-add" onclick="app.addItem('설정환매')">추가</button>
        </div>

        <!-- 리소스 -->
        <div class="tab-panel hidden" id="panel-리소스">
          <div class="form-grid">
            <input class="input" id="리소스-요약" type="text" placeholder="요약">
            <select class="input" id="리소스-분류">
              <option value="">분류 선택</option>
              <option>스왑</option>
              <option>ETN</option>
              <option>레포</option>
              <option>대차</option>
            </select>
          </div>
          <div class="resource-sub-group">
            <div class="resource-sub-label">리소스</div>
            <div class="form-grid form-grid-3">
              <input class="input" id="리소스-res코드" type="text" placeholder="펀드코드 (Tab)">
              <input class="input" id="리소스-res펀드명" type="text" placeholder="펀드명 (자동입력)">
              <input class="input" id="리소스-res금액" type="number" placeholder="금액(원)">
            </div>
          </div>
          <div class="resource-sub-group">
            <div class="resource-sub-label">설정</div>
            <div class="form-grid form-grid-3">
              <input class="input" id="리소스-set코드" type="text" placeholder="펀드코드 (Tab)">
              <input class="input" id="리소스-set펀드명" type="text" placeholder="펀드명 (자동입력)">
              <input class="input" id="리소스-set금액" type="number" placeholder="금액(원)">
            </div>
          </div>
          <div class="form-grid" style="margin-top:6px;">
            <input class="input span-full" id="리소스-비고" type="text" placeholder="비고">
          </div>
          <button class="btn-add" onclick="app.addItem('리소스')">추가</button>
        </div>

      </div>

      <!-- Modal Footer -->
      <div class="modal-footer">
        <span class="save-status" id="save-status"></span>
        <button class="btn-save" id="btn-save" onclick="app.saveDay()">저장</button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="overlay hidden" id="settings-overlay">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3>설정</h3>
        <button class="btn-close" id="btn-settings-close">✕</button>
      </div>
      <div class="settings-body">
        <label class="label">GitHub Personal Access Token</label>
        <input class="input" id="input-token" type="password" placeholder="ghp_...">
        <p class="settings-hint">토큰은 이 브라우저에만 저장됩니다. 타인과 공유하지 마세요.</p>

        <div class="settings-divider"></div>

        <label class="label">펀드 데이터 업데이트</label>
        <p class="settings-hint" id="fund-updated-at">마지막 업데이트: -</p>
        <button class="btn-fund-update" onclick="document.getElementById('fund-file-input').click()">
          📂 Excel 파일 선택
        </button>
        <p class="settings-hint" style="margin-top:6px;">
          Excel 형식: D열=펀드코드, E열=펀드명, J열=CU순자산총액(원)
        </p>

        <div class="settings-divider"></div>

        <label class="label" style="color:#ef4444;">위험 구역</label>
        <p class="settings-hint">GitHub 저장소의 모든 캘린더 데이터(YYYY-MM.json)를 삭제합니다. 복구 불가.</p>
        <button class="btn-delete-all" id="btn-delete-all" onclick="app.deleteAllData()">
          🗑 전체 데이터 삭제
        </button>
      </div>
      <div class="modal-footer">
        <button class="btn-save" onclick="app.saveSettings()">저장</button>
      </div>
    </div>
  </div>

  <!-- Hidden file input for fund Excel -->
  <input type="file" id="fund-file-input" accept=".xlsx,.xls,.csv" style="display:none">

  <!-- Toast Notification -->
  <div class="toast hidden" id="toast"></div>

  <!-- SheetJS for Excel parsing -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
